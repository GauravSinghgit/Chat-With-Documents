[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["alembic/versions", "alembic/env.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "B008",  # FastAPI's Depends(...) as a default argument is the intended pattern
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = ["app.services.*", "app.api.*"]
disallow_untyped_defs = true
